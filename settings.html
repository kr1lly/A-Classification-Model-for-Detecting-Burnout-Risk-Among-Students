<!DOCTYPE html> 
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: #333;
        }

        p {
            text-align: center;
            color: #555;
            font-size: 1.2em;
        }

        label {
            display: block;
            text-align: center;
            margin-top: 30px;
            font-size: 1.1em;
            color: #333;
        }

        input[type="range"] {
            display: block;
            margin: 20px auto;
        }
        .back-btn {
            display: inline-block;
            margin-top: 20px;
            text-decoration: none;
            background: #2575fc;
            color: white;
            padding: 10px 18px;
            border-radius: 8px;
            font-size: 0.95em;
            transition: 0.3s;
        }

        .back-btn:hover {
            background: #1a5edb;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-btn">← Back</a>

    <h1>Settings</h1>
    <p id="text">This is where you can manage your account settings and preferences.</p>

    <label for="sizeSlider">Text Size:</label>
    <input type="range" id="sizeSlider" min="12" max="50" value="16">

    <script>
        const slider = document.getElementById("sizeSlider");
        const text = document.getElementById("text");

        slider.addEventListener("input", function() {
            text.style.fontSize = slider.value + "px";
        });
    </script>

</body>
</html>
